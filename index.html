<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankhify</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #7000ff;
            --accent-glow: rgba(112, 0, 255, 0.4);
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 50px 20px;
        }

        /* Futuristinen animoitu tausta */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 60%);
            animation: drift 15s infinite alternate ease-in-out;
            z-index: -1;
        }

        @keyframes drift {
            from { transform: scale(1) translate(-10%, -10%); }
            to { transform: scale(1.2) translate(10%, 10%); }
        }

        .header-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 15px;
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
            margin-bottom: 50px;
            text-align: center;
        }

        .leaderboard-container {
            display: flex;
            flex-direction: column;
            gap: 60px;
            width: 100%;
            max-width: 600px;
        }

        .profile-card {
            position: relative;
            width: 100%;
            padding: 40px;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: transform 0.4s ease, border-color 0.4s ease;
        }

        .profile-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
        }

        .rank-crown {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
            filter: drop-shadow(0 0 15px var(--gold));
        }

        .player-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 48px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff 40%, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: var(--accent);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .stat-label {
            display: block;
            font-size: 9px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 22px;
            font-weight: 700;
        }

        .ht-text { color: var(--gold); text-shadow: 0 0 10px rgba(255,204,0,0.2); }
        .lt-text { color: #888; }
        
        /* Erikoisasettelu viimeiselle statille jos pariton määrä */
        .full-width { grid-column: span 2; }

    </style>
</head>
<body>

    <h1 class="header-title">Rankhify</h1>

    <div class="leaderboard-container" id="leaderboard">
        </div>

    <script>
        // TÄSTÄ VOIT LISÄTÄ TAI MUOKATA PELAAJIA
        const PLAYERS_DATABASE = [
            {
                name: "MrKetsuppi",
                ranks: [
                    { label: "Sword", val: "HT5", type: "ht" },
                    { label: "Crystal PvP", val: "HT4", type: "ht" },
                    { label: "Axe", val: "HT5", type: "ht" },
                    { label: "UHC", val: "LT5", type: "lt" },
                    { label: "Mace", val: "LT5", type: "lt", full: true }
                ]
            }
            // Voit lisätä uuden pelaajan näin:
            /*
            ,{
                name: "Esimerkki",
                ranks: [
                    { label: "Sword", val: "HT1", type: "ht" },
                    { label: "Crystal", val: "LT2", type: "lt" }
                ]
            }
            */
        ];

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = "";

            PLAYERS_DATABASE.forEach((player, index) => {
                const statsHtml = player.ranks.map(r => `
                    <div class="stat-item ${r.full ? 'full-width' : ''}">
                        <span class="stat-label">${r.label}</span>
                        <div class="stat-value ${r.type === 'ht' ? 'ht-text' : 'lt-text'}">
                            ${getIcon(r.label)} ${r.val}
                        </div>
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="profile-card">
                        <span class="rank-crown">${index === 0 ? '👑' : '⭐'}</span>
                        <h2 class="player-name">${player.name}</h2>
                        <div class="status-badge">${index === 0 ? 'ELITE LEADER' : 'TOP PLAYER'}</div>
                        <div class="stats-grid">
                            ${statsHtml}
                        </div>
                    </div>
                `;
            });
        }

        function getIcon(label) {
            const l = label.toLowerCase();
            if (l.includes("sword")) return "⚔️";
            if (l.includes("crystal")) return "🔮";
            if (l.includes("axe")) return "🪓";
            if (l.includes("uhc")) return "🍎";
            if (l.includes("mace")) return "🔨";
            return "🛡️";
        }

        renderLeaderboard();
    </script>

</body>
</html>
