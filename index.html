<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Rankhify</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #141414; --text: #ffffff;
            --accent: #5865f2; --border: #252525;
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
            --danger: #ff4747; --success: #43b581;
        }
        * { user-select: none; -webkit-user-select: none; cursor: default; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        nav { width: 100%; padding: 20px; background: #000; border-bottom: 2px solid var(--border); text-align: center; font-size: 24px; font-weight: 900; letter-spacing: 3px; color: var(--accent); }
        .search-container { padding: 20px; display: flex; justify-content: center; background: #0d0d0d; }
        #searchBox { width: 100%; max-width: 500px; padding: 12px 20px; background: #1a1a1a; border: 1px solid var(--border); color: white; border-radius: 25px; outline: none; cursor: text; }
        .rankings-wrapper { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 950px; }
        .player-row { background: var(--card); border: 1px solid var(--border); padding: 15px 25px; margin-bottom: 8px; display: grid; grid-template-columns: 60px 1.5fr 3fr 80px; align-items: center; border-radius: 8px; }
        .rank-id { font-weight: bold; font-size: 20px; text-align: center; }
        .rank-1 { color: var(--gold); } .rank-2 { color: var(--silver); } .rank-3 { color: var(--bronze); }
        .multi-ranks { display: flex; flex-wrap: wrap; gap: 5px; }
        .tier-tag { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: bold; padding: 4px 8px; border-radius: 4px; background: #222; border: 1px solid #333; }
        .edit-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .edit-btn:hover { color: var(--accent); transform: scale(1.2); }
        #admin-modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #161616; padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 380px; max-height: 90vh; overflow-y: auto; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid var(--border); color: white; border-radius: 6px; }
        button { background: var(--accent); border: none; font-weight: bold; cursor: pointer; }
        .btn-leave { background: #333; }
        .btn-danger { background: var(--danger); font-size: 12px; }
        .btn-success { background: var(--success); font-size: 12px; }
        .rank-edit-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 8px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #333; }
        .remove-rank-btn { color: var(--danger); cursor: pointer; font-weight: bold; background: none; border: none; width: auto; padding: 0 5px; margin: 0; }
        .hidden { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<nav>RANKHIFY</nav>

<div class="search-container">
    <input type="text" id="searchBox" placeholder="🔍 Etsi pelaajia..." onkeyup="updateList()">
</div>

<div class="rankings-wrapper">
    <div id="list-container" class="container"></div>
</div>

<div id="admin-modal">
    <div class="modal-content" id="login-section">
        <h3 style="text-align:center">ADMIN LOGIN 🔐</h3>
        <input type="password" id="passInput" placeholder="Salasana">
        <button onclick="login()">KIRJAUDU</button>
        <button class="btn-leave" onclick="closeModal()">SULJE</button>
    </div>
    <div class="modal-content hidden" id="panel-section">
        <h3 id="panel-title" style="color: var(--accent); text-align:center">HALLINTA</h3>
        <input type="text" id="pName" placeholder="Pelaajan nimi">
        <div id="existing-ranks-area" class="hidden">
            <p style="font-size: 11px; color: #888; margin-bottom: 5px;">Nykyiset rankit:</p>
            <div id="ranks-list-edit"></div>
        </div>
        <div style="border: 1px solid #333; padding: 10px; border-radius: 6px; margin: 10px 0;">
            <select id="pGM">
                <option value="Sword">⚔️ Sword</option><option value="Crystal">🔮 Crystal</option>
                <option value="Axe">🪓 Axe</option><option value="Mace">🔨 Mace</option><option value="UHC">🍎 UHC</option>
            </select>
            <select id="pTier">
                <option value="Coal">⚫ Coal</option><option value="Copper">🟠 Copper</option>
                <option value="Iron">⚪ Iron</option><option value="Diamond">💎 Diamond</option>
                <option value="Emerald">🟢 Emerald</option><option value="Netherite">🔥 Netherite</option>
            </select>
        </div>
        <button onclick="savePlayer()">PÄIVITÄ 🔥</button>
        <div id="ban-controls" style="margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;"></div>
        <button class="btn-leave" onclick="closeModal()" style="margin-top: 5px;">SULJE</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (TÄYTÄ TÄMÄ!) ---
    const firebaseConfig = {
        apiKey: "TÄHÄN",
        authDomain: "TÄHÄN",
        databaseURL: "TÄHÄN",
        projectId: "TÄHÄN",
        storageBucket: "TÄHÄN",
        messagingSenderId: "TÄHÄN",
        appId: "TÄHÄN"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const TIER_POINTS = { "Netherite": 100000, "Emerald": 10000, "Diamond": 1000, "Iron": 100, "Copper": 10, "Coal": 1 };
    const gmIcons = { Sword: "⚔️", Crystal: "🔮", Axe: "🪓", Mace: "🔨", UHC: "🍎" };
    const trIcons = { Coal: "⚫", Copper: "🟠", Iron: "⚪", Diamond: "💎", Emerald: "🟢", Netherite: "🔥" };

    let players = [];
    let editingPlayerKey = null;

    // Haetaan tiedot ja pidetään ne synkassa
    db.ref('players').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            players = Object.entries(data).map(([key, val]) => ({
                key: key,
                name: val.name || "Nimetön",
                ranks: val.ranks || {},
                banned: val.banned || false
            }));
        } else {
            players = [];
        }
        updateList();
    });

    // Right Shift -tunnistus (Vakaa versio)
    document.onkeydown = (e) => {
        if (e.key === "Shift" && e.location === 2) {
            openAdmin();
        }
    };

    function openAdmin(key = null) {
        editingPlayerKey = key;
        document.getElementById('admin-modal').style.display = 'flex';
        const p = players.find(x => x.key === key);
        const banControls = document.getElementById('ban-controls');
        const ranksEditArea = document.getElementById('existing-ranks-area');
        const listEdit = document.getElementById('ranks-list-edit');

        if (p) {
            document.getElementById('pName').value = p.name;
            banControls.innerHTML = p.banned ? 
                `<button class="btn-success" onclick="toggleBan()">UNBAN ✅</button>` : 
                `<button class="btn-danger" onclick="toggleBan()">BAN ⛔</button>`;
            ranksEditArea.classList.remove('hidden');
            listEdit.innerHTML = "";
            Object.entries(p.ranks).forEach(([gm, tr]) => {
                const item = document.createElement('div');
                item.className = 'rank-edit-item';
                item.innerHTML = `<span>${gmIcons[gm]} ${gm}: ${tr}</span> <button class="remove-rank-btn" onclick="removeRank('${gm}')">X</button>`;
                listEdit.appendChild(item);
            });
        } else {
            document.getElementById('pName').value = "";
            ranksEditArea.classList.add('hidden');
            banControls.innerHTML = "";
            listEdit.innerHTML = "";
        }
    }

    function login() {
        if(document.getElementById('passInput').value === "0204") {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('panel-section').classList.remove('hidden');
        } else { alert("Väärä salasana! ❌"); }
    }

    function closeModal() {
        document.getElementById('admin-modal').style.display = 'none';
        document.getElementById('passInput').value = "";
        editingPlayerKey = null;
        document.getElementById('login-section').classList.remove('hidden');
        document.getElementById('panel-section').classList.add('hidden');
    }

    function savePlayer() {
        const nameInput = document.getElementById('pName').value.trim();
        const gm = document.getElementById('pGM').value;
        const tr = document.getElementById('pTier').value;

        if(!nameInput) return;

        // Tarkistetaan löytyykö pelaaja jo listalta (nimen perusteella)
        let existing = players.find(p => p.name.toLowerCase() === nameInput.toLowerCase());

        if (existing) {
            // Päivitetään olemassa olevaa
            let updatedRanks = { ...existing.ranks };
            updatedRanks[gm] = tr;
            db.ref('players/' + existing.key).update({
                ranks: updatedRanks
            }).then(() => closeModal());
        } else {
            // Luodaan uusi pelaaja
            let newRanks = {};
            newRanks[gm] = tr;
            db.ref('players').push({
                name: nameInput,
                ranks: newRanks,
                banned: false
            }).then(() => closeModal());
        }
    }

    function removeRank(gm) {
        if (!editingPlayerKey) return;
        const p = players.find(x => x.key === editingPlayerKey);
        if (p && p.ranks[gm]) {
            let updatedRanks = { ...p.ranks };
            delete updatedRanks[gm];
            
            if (Object.keys(updatedRanks).length === 0) {
                db.ref('players/' + editingPlayerKey).remove();
                closeModal();
            } else {
                db.ref('players/' + editingPlayerKey + '/ranks').set(updatedRanks);
                openAdmin(editingPlayerKey); // Päivitä näkymä
            }
        }
    }

    function toggleBan() {
        if (!editingPlayerKey) return;
        const p = players.find(x => x.key === editingPlayerKey);
        if (p) {
            db.ref('players/' + editingPlayerKey).update({ banned: !p.banned });
            closeModal();
        }
    }

    function calculateScore(p) {
        return Object.values(p.ranks || {}).reduce((sum, tr) => sum + (TIER_POINTS[tr] || 0), 0);
    }

    function updateList() {
        const container = document.getElementById('list-container');
        const query = document.getElementById('searchBox').value.toLowerCase();
        container.innerHTML = "";

        const visible = players
            .filter(p => p.name.toLowerCase().includes(query) && !p.banned)
            .sort((a, b) => calculateScore(b) - calculateScore(a));

        visible.forEach((p, index) => {
            const rankNum = index + 1;
            let rankDisplay = `#${rankNum}`, rankClass = "";
            if (rankNum === 1) { rankDisplay = "🏆"; rankClass = "rank-1"; }
            else if (rankNum === 2) { rankDisplay = "🥈"; rankClass = "rank-2"; }
            else if (rankNum === 3) { rankDisplay = "🥉"; rankClass = "rank-3"; }

            let ranksHtml = "";
            Object.entries(p.ranks || {}).forEach(([gm, tr]) => {
                ranksHtml += `<div class="tier-tag">${gmIcons[gm]} ${trIcons[tr]} ${tr}</div>`;
            });

            const row = document.createElement('div');
            row.className = 'player-row';
            row.innerHTML = `
                <div class="rank-id ${rankClass}">${rankDisplay}</div>
                <div style="font-weight:bold">${p.name}</div>
                <div class="multi-ranks">${ranksHtml}</div>
                <button class="edit-btn" onclick="openAdmin('${p.key}')">✏️</button>
            `;
            container.appendChild(row);
        });
    }
</script>
</body>
</html>
